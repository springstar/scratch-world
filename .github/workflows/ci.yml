name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Install viewer deps
        run: npm ci --prefix viewer

      - name: Lint + type check
        run: npm run check

      - name: Run tests
        run: npm test
