name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Type check & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run check

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: check
    env:
      DATABASE_URL: "sqlite:./test.db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm test

  bench-smoke:
    name: Benchmark smoke (5 prompts)
    runs-on: ubuntu-latest
    needs: test
    # Only run on PRs to avoid burning API quota on every push
    if: github.event_name == 'pull_request'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATABASE_URL: "sqlite:./bench.db"
      SERVER_URL: "http://localhost:3000"
      SESSION_ID: "bench:ci"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build viewer
        working-directory: viewer
        run: |
          npm ci
          npm run build

      - name: Start server (background)
        run: |
          cp .env.example .env || true
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> .env
          echo "DATABASE_URL=sqlite:./bench.db" >> .env
          npm run dev &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break || sleep 2
          done

      - name: Run smoke benchmark (5 prompts)
        run: |
          npx tsx scripts/harness-bench.ts \
            --ids park-bench,village-dusk,bamboo-forest,beach-sunset,mountain-lake \
            --timeout 90
        timeout-minutes: 10

      - name: Check regression against baseline
        # Non-fatal: inform but don't block merge on first runs (no baseline yet)
        run: npx tsx scripts/harness-compare.ts --threshold 15 || true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: test/harness/results/
          retention-days: 30
