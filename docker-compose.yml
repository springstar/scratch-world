version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scratch_world
      POSTGRES_USER: scratch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scratch -d scratch_world"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://scratch:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/scratch_world
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MARBLE_API_KEY: ${MARBLE_API_KEY:-}
      MARBLE_API_URL: ${MARBLE_API_URL:-}
      CHANNEL: ${CHANNEL:-stdin}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      VIEWER_API_PORT: 3001
      VIEWER_BASE_URL: ${VIEWER_BASE_URL:-http://localhost:3001}
      SCENE_PROVIDER: ${SCENE_PROVIDER:-stub}
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
